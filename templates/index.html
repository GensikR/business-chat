<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Business Chat</title>
    <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body>
    <!-- Chat container -->
    <div class="chat-container">
        <!-- Chat messages area -->
        <div class="chat_window" id="chat_window">
            <!-- Existing messages will be dynamically loaded here -->
        </div>
        
        <!-- User input area -->
        <div class="chat-input">
            <input type="text" id="message_input" placeholder="Type a message..." />
            <button id="send_button">Send</button>
        </div>
    </div>

    <!-- Hidden field to store the session ID -->
    <input type="hidden" id="session_id" value="{{ session_id }}">

    <!-- Link to external JavaScript files -->
    <script src="/static/js/firebase.js" type="module"></script>
    <script src="/static/js/script.js" type="module"></script>
</body>
</html>
